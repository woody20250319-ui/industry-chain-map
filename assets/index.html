<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业链图谱生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080c14;
            --surface: #0f1520;
            --surface2: #161e2e;
            --border: #1c2840;
            --text: #dfe6f0;
            --text2: #8896ab;
            --text3: #4e5d73;
            --accent: #00e89d;
            --accent2: #00c4ff;
            --upstream: #00c4ff;
            --midstream: #a78bfa;
            --downstream: #00e89d;
            --radius: 14px;
        }

        /* ===== Theme: Tech (default dark) ===== */
        /* ===== Theme: Business ===== */
        body.theme-business {
            --bg: #0f1318;
            --surface: #171d25;
            --surface2: #1e2630;
            --border: #2a3545;
            --text: #c8d0da;
            --text2: #7a8899;
            --text3: #4a5568;
            --accent: #4a90e2;
            --accent2: #6366f1;
            --upstream: #4a90e2;
            --midstream: #6366f1;
            --downstream: #10b981;
        }

        /* ===== Theme: Fresh (light) ===== */
        body.theme-fresh {
            --bg: #f8faf9;
            --surface: #ffffff;
            --surface2: #f1f5f3;
            --border: #d4ddd8;
            --text: #1a2e23;
            --text2: #5a7264;
            --text3: #9ab3a5;
            --accent: #0d9465;
            --accent2: #0891b2;
            --upstream: #0891b2;
            --midstream: #8b5cf6;
            --downstream: #0d9465;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.5s, color 0.5s;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== HEADER ===== */
        .header {
            position: relative;
            padding: 70px 24px 40px;
            text-align: center;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -120px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,232,157,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            padding: 5px 14px;
            border: 1px solid var(--border);
            border-radius: 100px;
        }

        .page-title {
            font-size: clamp(30px, 5vw, 48px);
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -1.5px;
            color: var(--text);
            margin-bottom: 12px;
        }

        .page-sub {
            font-size: 15px;
            color: var(--text2);
            font-weight: 300;
            max-width: 460px;
            margin: 0 auto 32px;
            line-height: 1.7;
        }

        /* ===== TOOLBAR ===== */
        .toolbar {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 14px 22px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-row input::placeholder { color: var(--text3); }
        .input-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,232,157,0.1);
        }

        .btn-go {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #080c14;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }

        .btn-go:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-go:active { transform: translateY(0); }
        .btn-go:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-go .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(0,0,0,0.2);
            border-top-color: #080c14;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-go.loading .btn-text { display: none; }
        .btn-go.loading .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Options row */
        .opts-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .opt-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text2);
        }

        .opt-group label { white-space: nowrap; }

        .opt-group select {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .opt-group select:focus { border-color: var(--accent); }

        /* Presets */
        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }

        .preset {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .error {
            max-width: 680px;
            margin: 12px auto 0;
            padding: 12px 18px;
            border-radius: 10px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            font-size: 14px;
            display: none;
        }

        /* ===== THEME TOGGLE (top-right) ===== */
        .theme-btn {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 100;
            width: 42px; height: 42px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== VERSION TABS ===== */
        .versions {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px;
            display: none;
        }

        .versions.visible { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

        .ver-tab {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text3);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ver-tab:hover { border-color: var(--accent); color: var(--text2); }

        .ver-tab.active {
            background: var(--accent);
            color: #080c14;
            border-color: var(--accent);
            font-weight: 600;
        }

        /* ===== CHAIN DISPLAY ===== */
        .chain-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 8px 24px;
            display: none;
        }

        .chain-wrap.visible { display: block; }

        .chain-heading {
            text-align: center;
            font-size: clamp(22px, 3vw, 30px);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .edit-hint {
            text-align: center;
            color: var(--text3);
            font-size: 12px;
            margin-bottom: 24px;
        }

        .chain-columns {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        /* Section */
        .section {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .section.show { opacity: 1; transform: translateY(0); }
        .section:hover { border-color: rgba(0,232,157,0.3); box-shadow: 0 8px 40px rgba(0,0,0,0.15); }

        .section-head {
            padding: 16px 18px;
            text-align: center;
        }

        .section[data-i="0"] .section-head { background: linear-gradient(135deg, rgba(0,196,255,0.12), rgba(0,196,255,0.03)); }
        .section[data-i="1"] .section-head { background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(167,139,250,0.03)); }
        .section[data-i="2"] .section-head { background: linear-gradient(135deg, rgba(0,232,157,0.12), rgba(0,232,157,0.03)); }

        .section-head .sname {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .section[data-i="0"] .sname { color: var(--upstream); }
        .section[data-i="1"] .sname { color: var(--midstream); }
        .section[data-i="2"] .sname { color: var(--downstream); }

        .section-head .ssub {
            font-size: 12px;
            color: var(--text3);
            margin-top: 3px;
        }

        .section-body { padding: 14px; }

        /* Category */
        .cat {
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .cat:last-child { margin-bottom: 0; }
        .cat:hover { border-color: rgba(0,232,157,0.2); }

        .cat-name {
            padding: 7px 12px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
        }

        .section[data-i="0"] .cat-name { color: var(--upstream); background: rgba(0,196,255,0.06); }
        .section[data-i="1"] .cat-name { color: var(--midstream); background: rgba(167,139,250,0.06); }
        .section[data-i="2"] .cat-name { color: var(--downstream); background: rgba(0,232,157,0.06); }

        .cat-items { padding: 8px 12px; }

        .item {
            padding: 6px 0;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text2);
        }

        .item + .item { border-top: 1px solid rgba(28,40,64,0.6); }

        .item-label {
            color: var(--text);
            font-weight: 600;
        }

        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .tag {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 11.5px;
            font-weight: 600;
        }

        .tag-highlight {
            background: rgba(0,232,157,0.1);
            color: var(--accent);
            border: 1px solid rgba(0,232,157,0.25);
        }

        .tag-company {
            background: rgba(0,196,255,0.08);
            color: var(--accent2);
            border: 1px solid rgba(0,196,255,0.18);
        }

        .tag-market {
            background: rgba(245,158,11,0.08);
            color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.18);
            font-size: 10.5px;
        }

        /* Arrow */
        .arrow {
            flex-shrink: 0;
            width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 70px;
        }

        .arrow svg { opacity: 0.4; animation: pulse 2.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.65; } }

        /* ===== ACTIONS ===== */
        .actions {
            text-align: center;
            margin-top: 24px;
            padding-bottom: 48px;
            display: none;
        }

        .actions.visible { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

        .btn-act {
            padding: 9px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-act:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1100px) {
            .chain-columns { flex-direction: column; }
            .arrow { width: auto; padding: 0; height: 32px; transform: rotate(90deg); }
        }

        @media (max-width: 640px) {
            .header { padding: 56px 16px 28px; }
            .input-row { flex-direction: column; }
            .chain-wrap { padding: 8px 12px; }
            .theme-btn { top: 12px; right: 12px; width: 36px; height: 36px; font-size: 16px; }
        }

        [contenteditable]:focus {
            outline: none;
            background: rgba(0,232,157,0.06) !important;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <button class="theme-btn" id="themeBtn" onclick="cycleTheme()" title="切换风格">🎨</button>

    <div class="header">
        <div class="logo-mark">INDUSTRY CHAIN MAP</div>
        <h1 class="page-title">产业链图谱生成器</h1>
        <p class="page-sub">输入产业名称，AI 自动生成完整的上中下游产业链图谱</p>

        <div class="toolbar">
            <div class="input-row">
                <input type="text" id="industryInput" placeholder="输入产业名称，如：新能源汽车、低空经济、半导体…" />
                <button class="btn-go" id="generateBtn" onclick="generate()">
                    <span class="btn-text">生成图谱</span>
                    <span class="spinner"></span>
                </button>
            </div>

            <div class="opts-row">
                <div class="opt-group">
                    <label>颗粒度</label>
                    <select id="granularity">
                        <option value="brief">简要版</option>
                        <option value="standard" selected>标准版</option>
                        <option value="detailed">详细版</option>
                    </select>
                </div>
                <div class="opt-group">
                    <label>配色</label>
                    <select id="colorScheme" onchange="applyTheme(this.value)">
                        <option value="tech">科技风</option>
                        <option value="business">商务风</option>
                        <option value="fresh">清新风</option>
                    </select>
                </div>
            </div>

            <div class="presets">
                <button class="preset" onclick="quickFill('低空经济')">低空经济</button>
                <button class="preset" onclick="quickFill('新能源汽车')">新能源汽车</button>
                <button class="preset" onclick="quickFill('半导体')">半导体</button>
                <button class="preset" onclick="quickFill('人工智能')">人工智能</button>
                <button class="preset" onclick="quickFill('光伏')">光伏</button>
                <button class="preset" onclick="quickFill('生物医药')">生物医药</button>
                <button class="preset" onclick="quickFill('储能')">储能</button>
                <button class="preset" onclick="quickFill('机器人')">机器人</button>
            </div>
        </div>

        <div class="error" id="errorMsg"></div>
    </div>

    <!-- Version tabs -->
    <div class="versions" id="versions"></div>

    <!-- Chain display -->
    <div class="chain-wrap" id="chainWrap">
        <h2 class="chain-heading" id="chainTitle"></h2>
        <div class="edit-hint" id="editHint" style="display:none">✏️ 点击图谱中任意文字即可编辑</div>
        <div class="chain-columns" id="chainCols"></div>
    </div>

    <!-- Actions -->
    <div class="actions" id="actions">
        <button class="btn-act" onclick="downloadImage()">🖼️ 下载图片</button>
        <button class="btn-act" onclick="exportHTML()">📥 导出 HTML</button>
        <button class="btn-act" onclick="exportJSON()">📋 复制 JSON</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        // ===== html2canvas loader =====
        function ensureH2C() {
            return new Promise((resolve, reject) => {
                if (typeof html2canvas === 'function') return resolve();
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                s.onload = () => typeof html2canvas === 'function' ? resolve() : reject(new Error('html2canvas 加载失败'));
                s.onerror = () => reject(new Error('html2canvas 加载失败'));
                document.head.appendChild(s);
            });
        }

        // ===== State =====
        let versions = []; // [{id, industry, granularity, data}]
        let activeVersion = -1;
        let verIdCounter = 0;

        // ===== Quick fill & generate =====
        function quickFill(n) { document.getElementById('industryInput').value = n; generate(); }

        async function generate() {
            const inp = document.getElementById('industryInput');
            const btn = document.getElementById('generateBtn');
            const err = document.getElementById('errorMsg');
            const v = inp.value.trim();
            if (!v) { inp.focus(); return; }

            const gran = document.getElementById('granularity').value;
            btn.classList.add('loading'); btn.disabled = true; err.style.display = 'none';

            try {
                const r = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ industry: v, granularity: gran }),
                    signal: AbortSignal.timeout(120000)
                });
                const j = await r.json();
                if (!r.ok) throw new Error(j.error || '生成失败');

                const id = ++verIdCounter;
                versions.push({ id, industry: v, granularity: gran, data: j.data });
                activeVersion = versions.length - 1;
                renderVersionTabs();
                render(j.data);
            } catch (e) {
                err.textContent = e.message; err.style.display = 'block';
            } finally {
                btn.classList.remove('loading'); btn.disabled = false;
            }
        }

        // ===== Version tabs =====
        function renderVersionTabs() {
            const el = document.getElementById('versions');
            if (versions.length < 1) { el.classList.remove('visible'); return; }
            el.classList.add('visible');
            const granLabel = { brief: '简', standard: '标', detailed: '详' };
            el.innerHTML = versions.map((v, i) =>
                `<button class="ver-tab ${i === activeVersion ? 'active' : ''}" onclick="switchVersion(${i})">${v.industry} (${granLabel[v.granularity] || '标'}) #${v.id}</button>`
            ).join('');
        }

        function switchVersion(i) {
            if (i < 0 || i >= versions.length) return;
            activeVersion = i;
            renderVersionTabs();
            render(versions[i].data);
        }

        // ===== Render chain =====
        function render(data) {
            const wrap = document.getElementById('chainWrap');
            const cols = document.getElementById('chainCols');
            const title = document.getElementById('chainTitle');
            const hint = document.getElementById('editHint');
            const acts = document.getElementById('actions');

            title.textContent = data.title || '产业链图谱';
            hint.style.display = '';

            const arrow = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

            let h = '';
            (data.sections || []).forEach((sec, i) => {
                let cats = '';
                (sec.categories || []).forEach(c => {
                    let items = '';
                    (c.items || []).forEach(it => {
                        const lbl = it.label ? `<span class="item-label">${it.label}：</span>` : '';
                        const mainText = it.highlight
                            ? `<span class="tag tag-highlight">${it.text}</span>`
                            : it.text;

                        // Meta tags: companies + market
                        let meta = '';
                        if (it.companies) {
                            meta += `<span class="tag tag-company">🏢 ${it.companies}</span>`;
                        }
                        if (it.market) {
                            meta += `<span class="tag tag-market">📊 ${it.market}</span>`;
                        }
                        const metaHtml = meta ? `<div class="item-meta">${meta}</div>` : '';

                        items += `<div class="item">${lbl}${mainText}${metaHtml}</div>`;
                    });
                    cats += `<div class="cat"><div class="cat-name">${c.name}</div><div class="cat-items">${items}</div></div>`;
                });
                h += `<div class="section" data-i="${i}"><div class="section-head"><div class="sname">${sec.name}</div><div class="ssub">${sec.subtitle || ''}</div></div><div class="section-body">${cats}</div></div>`;
                if (i < data.sections.length - 1) h += `<div class="arrow">${arrow}</div>`;
            });

            cols.innerHTML = h;
            wrap.classList.add('visible');
            acts.classList.add('visible');

            document.querySelectorAll('.section').forEach((el, i) => {
                setTimeout(() => el.classList.add('show'), 100 * i);
            });

            setTimeout(makeEditable, 500);
        }

        // ===== Inline editing =====
        function makeEditable() {
            const wrap = document.getElementById('chainWrap');
            wrap.querySelectorAll('.chain-heading, .sname, .ssub, .cat-name, .item-label, .item, .tag, .item-meta').forEach(el => {
                if (el.classList.contains('item-meta')) return; // don't make the meta container editable
                el.setAttribute('contenteditable', 'true');
                el.style.cursor = 'text';
            });
        }

        // ===== Download image =====
        function downloadImage() {
            const el = document.getElementById('chainWrap');
            if (!el || activeVersion < 0) { alert('请先生成图谱'); return; }

            const cs = getComputedStyle(document.body);
            const bg = cs.getPropertyValue('--bg').trim() || '#080c14';
            const titleEl = document.getElementById('chainTitle');
            const hint = document.getElementById('editHint');
            const origColor = titleEl.style.color;
            titleEl.style.color = cs.getPropertyValue('--text').trim();
            if (hint) hint.style.display = 'none';

            ensureH2C().then(() => html2canvas(el, {
                backgroundColor: bg, scale: 2, useCORS: true, logging: false,
                width: el.scrollWidth, height: el.scrollHeight
            })).then(canvas => {
                titleEl.style.color = origColor;
                if (hint) hint.style.display = '';
                canvas.toBlob(blob => {
                    const u = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = u; a.download = (versions[activeVersion]?.data?.title || '产业链图谱') + '.png';
                    a.style.display = 'none';
                    document.body.appendChild(a); a.click();
                    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(u); }, 100);
                }, 'image/png');
            }).catch(e => {
                titleEl.style.color = origColor;
                if (hint) hint.style.display = '';
                alert('导出失败: ' + e.message);
            });
        }

        // ===== Export HTML =====
        function exportHTML() {
            if (activeVersion < 0) return;
            const data = versions[activeVersion].data;
            const html = standaloneHTML(data);
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const u = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = u; a.download = (data.title || '产业链图谱') + '.html'; a.click();
            URL.revokeObjectURL(u);
        }

        function standaloneHTML(data) {
            let secs = '';
            data.sections.forEach((s, i) => {
                let cats = '';
                s.categories.forEach(c => {
                    let items = '';
                    c.items.forEach(it => {
                        const l = it.label ? `<strong>${it.label}：</strong>` : '';
                        const t = it.highlight ? `<span style="background:#d1fae5;padding:1px 6px;border-radius:3px;font-weight:600;color:#065f46">${it.text}</span>` : it.text;
                        let meta = '';
                        if (it.companies) meta += `<span style="font-size:11px;color:#0369a1;margin-left:6px">🏢 ${it.companies}</span>`;
                        if (it.market) meta += `<span style="font-size:11px;color:#b45309;margin-left:6px">📊 ${it.market}</span>`;
                        items += `<div style="margin-bottom:8px;line-height:1.7;color:#444;font-size:13px">${l}${t}${meta}</div>`;
                    });
                    cats += `<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden"><div style="background:#ecfdf5;padding:7px 12px;font-weight:600;color:#065f46;font-size:13px;text-align:center">${c.name}</div><div style="padding:10px 12px;background:#fafbfc">${items}</div></div>`;
                });
                const colors = ['#0891b2','#7c3aed','#0d9465'];
                secs += `<div style="flex:1;background:white;border-radius:12px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,0.05)"><div style="background:${colors[i]};color:white;padding:12px;border-radius:8px;text-align:center;margin-bottom:16px"><div style="font-size:17px;font-weight:700">${s.name}</div><div style="font-size:11px;opacity:0.85;margin-top:3px">${s.subtitle||''}</div></div>${cats}</div>`;
            });
            return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${data.title}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans SC','PingFang SC',sans-serif;background:#f0fdf4;min-height:100vh;padding:36px 20px}.w{max-width:1200px;margin:0 auto}h1{text-align:center;font-size:26px;color:#1a1a1a;margin-bottom:32px}.c{display:flex;gap:20px}@media(max-width:900px){.c{flex-direction:column}}</style></head><body><div class="w"><h1>${data.title}</h1><div class="c">${secs}</div></div></body></html>`;
        }

        // ===== Export JSON =====
        function exportJSON() {
            if (activeVersion < 0) return;
            navigator.clipboard.writeText(JSON.stringify(versions[activeVersion].data, null, 2)).then(() => alert('JSON 已复制到剪贴板'));
        }

        // ===== Theme =====
        const themes = ['tech', 'business', 'fresh'];
        let themeIdx = 0;

        function applyTheme(name) {
            document.body.classList.remove('theme-business', 'theme-fresh');
            if (name === 'business') document.body.classList.add('theme-business');
            else if (name === 'fresh') document.body.classList.add('theme-fresh');
            document.getElementById('colorScheme').value = name;
            localStorage.setItem('chainTheme', name);
        }

        function cycleTheme() {
            themeIdx = (themeIdx + 1) % themes.length;
            applyTheme(themes[themeIdx]);
            const icons = { tech: '🎨', business: '💼', fresh: '🌿' };
            document.getElementById('themeBtn').textContent = icons[themes[themeIdx]] || '🎨';
        }

        // Init theme
        (function() {
            const saved = localStorage.getItem('chainTheme') || 'tech';
            themeIdx = themes.indexOf(saved);
            if (themeIdx < 0) themeIdx = 0;
            applyTheme(themes[themeIdx]);
            const icons = { tech: '🎨', business: '💼', fresh: '🌿' };
            document.getElementById('themeBtn').textContent = icons[themes[themeIdx]];
            document.getElementById('colorScheme').value = themes[themeIdx];
        })();

        // Enter key
        document.getElementById('industryInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
    </script>
</body>
</html>
